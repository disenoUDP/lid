  - nombre: Janis Sepúlveda
    github: janisepulveda
    correo: janis.sepulveda
    bio: Diseñadora industrial UDP, estudiante del magíster de Diseño Avanzado UC,
      con enfoque en diseño centrado en el usuario y experiencias digitales. Su
      área de investigación es en la facilitación de interacciones más humanas y
      conscientes en contextos sensibles, como la salud y el bienestar. He
      participado en proyectos colaborativos como la app de Diseño Abierto de la
      Escuela de Diseño UDP, Su tesis de pregrado fue una app móvil que permite
      monitorear síntomas físicos y emocionales, pensada especialmente para
      quienes enfrentan neuralgia del trigémino. Desde el 2023 es ayudante de
      investigación y de cursos de pregrado de programación creativa. Su
      objetivo es construir soluciones empáticas que respondan a necesidades
      reales.

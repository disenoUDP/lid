personas:
  - nombre: Aarón Montoya
    github: montoyamoraga
    correo: aaron.montoya
    bio: Ingeniere civil electricista de la Pontificia Universidad Católica de
      Chile, magíster en arte electrónico de New York University, y magíster en
      ciencias y artes mediales de Massachusetts Institute of Technology.
      Actualmente es profesore asistente en la Escuela de Diseño UDP, y
      estudiante del Doctorado en Artes y Humanidades de la Universidad de
      Santiago Chile. Su tema de investigación es el diseño, escritura y
      manufactura de software y hardware para la creación de instrumentos
      musicales electrónicos y computacionales de fuente abierta.
